<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Portfolio{% endblock %}</title>
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/style.css') }}"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
        <script>
            const savedTheme = localStorage.getItem('theme');
            const prefersDarkScheme = window.matchMedia(
                '(prefers-color-scheme: dark)',
            );

            const theme =
                savedTheme || (prefersDarkScheme.matches ? 'dark' : 'dark');
            document.documentElement.setAttribute('data-theme', theme);

            function toggleDarkMode() {
                const currentTheme =
                    document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);

                const toggleIcon = document.querySelector('.dark-mode-toggle i');
                if (toggleIcon) {
                    toggleIcon.className =
                        newTheme === 'dark'
                            ? 'fas fa-sun'
                            : 'fas fa-moon';
                }
            }

            function toggleMobileMenu() {
                const nav = document.querySelector('nav ul');
                nav.classList.toggle('mobile-open');
            }

            document.addEventListener('DOMContentLoaded', function () {
                const currentTheme =
                    document.documentElement.getAttribute('data-theme');
                const toggleIcon = document.querySelector('.dark-mode-toggle i');
                if (toggleIcon) {
                    toggleIcon.className =
                        currentTheme === 'dark'
                            ? 'fas fa-sun'
                            : 'fas fa-moon';
                }
            });
        </script>
    </head>
    <body>
        <nav class="main-nav">
            <div class="nav-container">
                <a href="{{ url_for('home') }}" class="nav-logo">
                    <span class="logo-text">SB</span>
                </a>
                <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                    <i class="fas fa-bars"></i>
                </button>
                <ul class="nav-links">
                    <li>
                        <a href="{{ url_for('home') }}" {% if request.endpoint == 'home' %}class="active"{% endif %}>
                            <i class="fas fa-home"></i> Home
                        </a>
                    </li>
                    <li>
                        <a href="{{ url_for('about') }}" {% if request.endpoint == 'about' %}class="active"{% endif %}>
                            <i class="fas fa-user"></i> About
                        </a>
                    </li>
                    <li>
                        <a href="{{ url_for('projects') }}" {% if request.endpoint == 'projects' %}class="active"{% endif %}>
                            <i class="fas fa-code"></i> Projects
                        </a>
                    </li>
                    <li>
                        <a href="{{ url_for('skills') }}" {% if request.endpoint == 'skills' %}class="active"{% endif %}>
                            <i class="fas fa-tools"></i> Skills
                        </a>
                    </li>
                    <li>
                        <a href="{{ url_for('services') }}" {% if request.endpoint == 'services' %}class="active"{% endif %}>
                            <i class="fas fa-briefcase"></i> Services
                        </a>
                    </li>
                    <li>
                        <a href="{{ url_for('blog') }}" {% if request.endpoint == 'blog' %}class="active"{% endif %}>
                            <i class="fas fa-blog"></i> Blog
                        </a>
                    </li>
                    <li>
                        <a href="{{ url_for('contact') }}" {% if request.endpoint == 'contact' %}class="active"{% endif %}>
                            <i class="fas fa-envelope"></i> Contact
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <main>{% block content %}{% endblock %}</main>

        <button id="dark-mode-toggle" class="dark-mode-toggle" onclick="toggleDarkMode()" title="Toggle dark mode">
            <i class="fas fa-moon"></i>
        </button>

        <footer class="main-footer">
            <div class="footer-container">
                <div class="footer-content">
                    <div class="footer-brand">
                        <span class="footer-logo">SB</span>
                        <p class="footer-tagline">Building tomorrow's solutions today.</p>
                    </div>
                    <div class="footer-links">
                        <h4>Quick Links</h4>
                        <ul>
                            <li><a href="{{ url_for('home') }}">Home</a></li>
                            <li><a href="{{ url_for('about') }}">About</a></li>
                            <li><a href="{{ url_for('projects') }}">Projects</a></li>
                            <li><a href="{{ url_for('contact') }}">Contact</a></li>
                        </ul>
                    </div>
                    <div class="footer-social">
                        <h4>Connect</h4>
                        <div class="social-icons">
                            <a href="#" title="GitHub"><i class="fab fa-github"></i></a>
                            <a href="#" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                            <a href="#" title="Fiverr"><i class="fas fa-globe"></i></a>
                            <a href="#" title="Email"><i class="fas fa-envelope"></i></a>
                        </div>
                    </div>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2025 Shohan Biswas. All rights reserved.</p>
                    <p class="footer-credit">Built with <i class="fas fa-heart"></i> and Flask</p>
                </div>
            </div>
        </footer>

        <script>
            window.addEventListener('scroll', function() {
                const nav = document.querySelector('.main-nav');
                if (window.scrollY > 50) {
                    nav.classList.add('scrolled');
                } else {
                    nav.classList.remove('scrolled');
                }
            });

            document.addEventListener('DOMContentLoaded', function() {
                if (typeof gsap !== 'undefined') {
                    gsap.registerPlugin(ScrollTrigger);

                    gsap.utils.toArray('.section-header').forEach((section) => {
                        gsap.from(section, {
                            scrollTrigger: {
                                trigger: section,
                                start: 'top 80%',
                                toggleActions: 'play none none none',
                            },
                            opacity: 0,
                            y: 50,
                            duration: 0.8,
                            ease: 'power3.out',
                        });
                    });

                    gsap.utils.toArray('.animate-card').forEach((card) => {
                        gsap.from(card, {
                            scrollTrigger: {
                                trigger: card,
                                start: 'top 85%',
                                toggleActions: 'play none none none',
                            },
                            opacity: 0,
                            y: 30,
                            duration: 0.6,
                            ease: 'power3.out',
                        });
                    });
                }

                document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                    anchor.addEventListener('click', function(e) {
                        e.preventDefault();
                        const target = document.querySelector(this.getAttribute('href'));
                        if (target) {
                            target.scrollIntoView({
                                behavior: 'smooth',
                                block: 'start',
                            });
                        }
                    });
                });
            });
        </script>
    </body>
</html>
